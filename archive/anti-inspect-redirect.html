<!-- ============================================================================
     ARCHIVED: anti-inspect DevTools → YouTube redirect
     ----------------------------------------------------------------------------
     Disabled 2026-06-17 at user request ("disable redirecting on youtube when
     opening inspect element for now"). Kept here so it can be re-enabled later.

     TO RE-ENABLE:
       Paste the <script> block below back into stredio.html in <head>, right after
       the HLS.js include (<script src="/assets/hls.min.js"></script>), where the
       "anti-inspect re-enable point" comment marker now sits.

     WHAT IT DID:
       Redirected the visitor to a YouTube short whenever DevTools / "inspect
       element" was opened — via F12, Ctrl/Cmd+Shift+I/J/C, Ctrl/Cmd+U
       (view-source), or a viewport-shrink probe that detects a docked DevTools
       panel. Best-effort deterrent only; bypassable by disabling JS / view-source.
     ============================================================================ -->
<!-- anti-inspect: redirect away if DevTools is opened. Best-effort deterrent only —
     a determined user can disable JS / use view-source and bypass it entirely. -->
<script>
(function () {
  var REDIRECT = 'https://www.youtube.com/shorts/qFpDOn5Sfvo?t=3&feature=share';
  var gone = false;
  function bust() {
    if (gone) return;
    gone = true;
    try { window.location.replace(REDIRECT); }
    catch (e) { window.location.href = REDIRECT; }
  }

  // DevTools / view-source keyboard shortcuts → redirect.
  document.addEventListener('keydown', function (e) {
    var k = e.keyCode || e.which;
    var ctrlShift = (e.ctrlKey || e.metaKey) && e.shiftKey;
    if (k === 123) { e.preventDefault(); bust(); return; }                       // F12
    if (ctrlShift && (k === 73 || k === 74 || k === 67)) { e.preventDefault(); bust(); return; } // I / J / C
    if ((e.ctrlKey || e.metaKey) && k === 85) { e.preventDefault(); bust(); return; }            // Ctrl+U view-source
  }, true);

  // Viewport-shrink probe: opening DevTools docked (the default for right-click →
  // Inspect) pins a panel to the side/bottom, shrinking the page viewport while the
  // window stays the same size. We measure the gap between the window and the
  // viewport; if it grows past a baseline, DevTools just opened. Unlike a `debugger`
  // statement this never freezes the page, so the redirect is automatic — no
  // "Paused in debugger" screen.
  var baseW = null, baseH = null;
  function valid() {
    // Early in load the browser can report outer* as 0 — those readings are junk
    // and were causing false redirects on a normal page load.
    return window.outerWidth > 100 && window.outerHeight > 100;
  }
  function setBaseline() {
    if (!valid()) return;
    baseW = window.outerWidth  - window.innerWidth;
    baseH = window.outerHeight - window.innerHeight;
  }
  function probe() {
    if (gone || !valid()) return;
    if (baseW === null) { setBaseline(); return; }   // first stable reading = baseline
    var dW = (window.outerWidth  - window.innerWidth)  - baseW;
    var dH = (window.outerHeight - window.innerHeight) - baseH;
    if (dW > 120 || dH > 120) bust();
  }
  if (document.readyState === 'complete') setBaseline();
  else window.addEventListener('load', setBaseline);
  setInterval(probe, 300);
})();
</script>
